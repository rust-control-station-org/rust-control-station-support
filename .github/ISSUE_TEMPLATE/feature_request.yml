# GitHub Issue Form: 機能要望
name: "✨ 機能要望"
description: 新機能・改善案を提案します。
title: "✨ "
labels:
  - enhancement

body:
  # フォーム冒頭に表示する案内文です。Issue本文には含まれません。
  - type: markdown
    attributes:
      value: |
        ご提案ありがとうございます。
        すべてのご要望を採用できるとは限りませんが、今後の開発の参考にさせていただきます。

  - type: textarea
    id: problem
    attributes:
      label: 現在困っていること
      description: 現在の課題や不便に感じている点を具体的に記入してください。
      placeholder: どのような場面で、何に困っているかを記入してください。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: 追加・改善してほしい内容を記入してください。
      placeholder: 実現してほしい機能や改善案を記入してください。
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 想定する利用シーン
      description: この機能や改善が役立つ具体的な利用シーンがあれば記入してください。
      placeholder: どのようなユーザーや運用で利用する想定かを記入してください。
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 現在検討している回避策や別案があれば記入してください。
      placeholder: 代替手段や既存機能での回避方法があれば記入してください。
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 補足情報
      description: 関連するリンク、資料、スクリーンショットなどがあれば記入してください。
      placeholder: 補足情報があれば記入してください。
    validations:
      required: false
